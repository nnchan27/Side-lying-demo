<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>坐直先 · 側躺偵測demo</title>
<style>
  :root{
    --ink:#eae6df;
    --dim:#8a8580;
    --paper:#141312;
    --panel:#1c1a18;
    --line:#332f2b;
    --warn:#e0562f;
    --ok:#3fa66b;
    --mono: 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
    --serif: Georgia, 'Noto Serif TC', serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper); color:var(--ink);
    font-family:var(--mono);
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  body{
    display:flex; flex-direction:column;
    min-height:100vh;
    padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
  }
  header{
    display:flex; justify-content:space-between; align-items:baseline;
    border-bottom:1px solid var(--line);
    padding-bottom:14px; margin-bottom:22px;
  }
  h1{
    font-family:var(--serif); font-weight:400; font-size:19px;
    margin:0; letter-spacing:0.3px;
  }
  .status-pill{
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    padding:4px 9px; border-radius:20px; border:1px solid var(--line);
    color:var(--dim);
  }
  .status-pill.live{ color:var(--ok); border-color:var(--ok); }
  .status-pill.tripped{ color:var(--warn); border-color:var(--warn); }

  main{ flex:1; display:flex; flex-direction:column; gap:22px; }

  /* --- gauge --- */
  .gauge-wrap{
    display:flex; flex-direction:column; align-items:center;
    padding:28px 0 8px;
  }
  svg{ overflow:visible; }
  .gauge-arc-bg{ fill:none; stroke:var(--line); stroke-width:10; }
  .gauge-arc-safe{ fill:none; stroke:var(--ok); stroke-width:10; opacity:0.35; }
  .gauge-needle{ transform-origin:100px 100px; transition:transform 90ms linear; }
  .gauge-needle line{ stroke:var(--ink); stroke-width:3; stroke-linecap:round; }
  .gauge-needle circle{ fill:var(--ink); }
  .gauge-readout{ font-family:var(--mono); font-size:13px; color:var(--dim); margin-top:6px; }
  .gauge-readout b{ color:var(--ink); font-size:15px; }

  /* --- controls --- */
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:16px 18px;
  }
  .card + .card{ margin-top:0; }
  .row{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .row + .row{ margin-top:14px; }
  label{ font-size:13px; color:var(--dim); }
  input[type=range]{ width:130px; accent-color:var(--warn); }
  .val{ font-size:13px; color:var(--ink); width:34px; text-align:right; }

  button{
    font-family:var(--mono); font-size:14px; letter-spacing:0.02em;
    border-radius:10px; border:1px solid var(--line);
    background:transparent; color:var(--ink);
    padding:13px 16px; cursor:pointer; width:100%;
  }
  button.primary{ background:var(--ink); color:var(--paper); border-color:var(--ink); font-weight:600; }
  button:active{ opacity:0.7; }

  .hint{ font-size:12px; color:var(--dim); line-height:1.6; }

  /* --- blackout overlay --- */
  #overlay{
    position:fixed; inset:0; background:#000;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    z-index:50; text-align:center; padding:32px;
  }
  #overlay.on{ display:flex; }
  #overlay .msg{
    font-family:var(--serif); font-size:22px; color:#e8e4dd; margin-bottom:10px;
  }
  #overlay .sub{ font-size:13px; color:#5a5650; font-family:var(--mono); margin-bottom:36px; }
  .ring-wrap{ position:relative; width:120px; height:120px; }
  .ring-wrap svg{ transform:rotate(-90deg); }
  .ring-bg{ fill:none; stroke:#242220; stroke-width:6; }
  .ring-fg{ fill:none; stroke:#3fa66b; stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 120ms linear; }
  .ring-num{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:26px; color:#e8e4dd;
  }
  #resetHint{ margin-top:28px; font-size:11px; color:#454138; }

  footer{ margin-top:24px; font-size:11px; color:#5a5650; line-height:1.7; }
  a{ color:var(--dim); }
</style>
</head>
<body>

<header>
  <h1>坐直先</h1>
  <div class="status-pill" id="statusPill">未啟動</div>
</header>

<main>
  <div class="card gauge-wrap">
    <svg width="200" height="120" viewBox="0 0 200 120">
      <path class="gauge-arc-bg" d="M 20 100 A 80 80 0 0 1 180 100"></path>
      <path class="gauge-arc-safe" id="safeArc" d=""></path>
      <g class="gauge-needle" id="needle">
        <line x1="100" y1="100" x2="100" y2="30"></line>
        <circle cx="100" cy="100" r="5"></circle>
      </g>
    </svg>
    <div class="gauge-readout">傾側角度 <b id="angleVal">--</b>°</div>
  </div>

  <div class="card">
    <div class="row">
      <label>側轉敏感度</label>
      <div style="display:flex; align-items:center; gap:8px;">
        <input type="range" id="threshold" min="20" max="70" value="40">
        <span class="val" id="thresholdVal">40°</span>
      </div>
    </div>
    <div class="row">
      <label>舉高容忍度</label>
      <div style="display:flex; align-items:center; gap:8px;">
        <input type="range" id="betaTolerance" min="10" max="60" value="30">
        <span class="val" id="betaToleranceVal">30°</span>
      </div>
    </div>
    <div class="row">
      <label>解鎖需維持</label>
      <div style="display:flex; align-items:center; gap:8px;">
        <input type="range" id="holdTime" min="3" max="20" value="10">
        <span class="val" id="holdTimeVal">10s</span>
      </div>
    </div>
    <div class="hint" style="margin-top:12px;">
      「側轉敏感度」控制手機左右傾側幾多先算側躺。「舉高容忍度」控制上下舉高手機嘅容許幅度 — 舉高超過呢個幅度會當成「只係郁緊手機」,唔會觸發黑屏。
    </div>
  </div>

  <div class="card">
    <button class="primary" id="startBtn">開始偵測</button>
    <div class="hint" style="margin-top:12px;">
      撳「開始」之後,將手機保持返平時「坐直/企直」用手機嘅角度,呢個就係基準線。之後將手機側轉超過門檻角度,就會觸發黑屏。
    </div>
  </div>

  <div class="card">
    <button id="calibrateBtn" disabled>重新校準基準角度</button>
  </div>
</main>

<footer>
  純本地運算,唔會擷取相機、唔會上傳任何資料。用嘅係手機嘅方向感應器 (DeviceOrientation)。iOS 需要喺「開始偵測」時批准動作感應權限。
</footer>

<div id="overlay">
  <div class="msg">請坐直 / 躺正</div>
  <div class="sub">維持正常姿勢先可以解鎖</div>
  <div class="ring-wrap">
    <svg width="120" height="120">
      <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
      <circle class="ring-fg" id="ringFg" cx="60" cy="60" r="52" stroke-dasharray="327" stroke-dashoffset="327"></circle>
    </svg>
    <div class="ring-num" id="ringNum">10</div>
  </div>
  <div id="resetHint"></div>
</div>

<script>
(function(){
  const startBtn = document.getElementById('startBtn');
  const calibrateBtn = document.getElementById('calibrateBtn');
  const statusPill = document.getElementById('statusPill');
  const angleVal = document.getElementById('angleVal');
  const needle = document.getElementById('needle');
  const safeArc = document.getElementById('safeArc');
  const thresholdInput = document.getElementById('threshold');
  const thresholdVal = document.getElementById('thresholdVal');
  const betaToleranceInput = document.getElementById('betaTolerance');
  const betaToleranceVal = document.getElementById('betaToleranceVal');
  const holdTimeInput = document.getElementById('holdTime');
  const holdTimeVal = document.getElementById('holdTimeVal');
  const overlay = document.getElementById('overlay');
  const ringFg = document.getElementById('ringFg');
  const ringNum = document.getElementById('ringNum');
  const resetHint = document.getElementById('resetHint');

  let baseline = null;   // 基準 {gamma, beta} 角度 (坐直姿勢)
  let threshold = 40;      // 側轉 (gamma) 門檻
  let betaTolerance = 30;  // 上下舉高 (beta) 容忍幅度
  let holdSeconds = 10;
  let tripped = false;
  let holdStart = null;
  let rafId = null;
  const CIRC = 2 * Math.PI * 52;

  thresholdInput.addEventListener('input', () => {
    threshold = +thresholdInput.value;
    thresholdVal.textContent = threshold + '°';
  });
  betaToleranceInput.addEventListener('input', () => {
    betaTolerance = +betaToleranceInput.value;
    betaToleranceVal.textContent = betaTolerance + '°';
  });
  holdTimeInput.addEventListener('input', () => {
    holdSeconds = +holdTimeInput.value;
    holdTimeVal.textContent = holdSeconds + 's';
  });

  function setStatus(text, cls){
    statusPill.textContent = text;
    statusPill.className = 'status-pill' + (cls ? ' ' + cls : '');
  }

  function updateGauge(gamma){
    // gamma: -90 .. 90, map to needle rotation -80..80 deg visually
    const clamped = Math.max(-90, Math.min(90, gamma));
    const rot = clamped * (80/90);
    needle.style.transform = `rotate(${rot}deg)`;
    angleVal.textContent = Math.round(gamma);

    if (baseline !== null){
      const lo = baseline.gamma - threshold;
      const hi = baseline.gamma + threshold;
      // draw safe zone arc roughly (visual approx, not pixel-perfect)
      const loRot = Math.max(-90, Math.min(90, lo)) * (80/90);
      const hiRot = Math.max(-90, Math.min(90, hi)) * (80/90);
      safeArc.setAttribute('d', arcPath(loRot, hiRot));
    }
  }

  function arcPath(fromDeg, toDeg){
    // approximate visual band on the 200x120 gauge, purely illustrative
    const r = 80, cx = 100, cy = 100;
    const toRad = d => (d - 90) * Math.PI/180;
    const a1 = toRad(fromDeg), a2 = toRad(toDeg);
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const x2 = cx + r*Math.cos(a2), y2 = cy + r*Math.sin(a2);
    return `M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}`;
  }

  function isNormalPosture(gamma, beta){
    if (baseline === null) return true;
    const gammaDev = Math.abs(gamma - baseline.gamma);
    const betaDev = Math.abs(beta - baseline.beta);
    // 舉高/放低手機時 beta 會大幅偏離 baseline —— 呢種情況唔當側躺,
    // 只有喺 beta 大致穩定(冇大幅舉高/放低)嘅前提下,先睇 gamma 有冇側轉超標。
    if (betaDev > betaTolerance) return true;
    return gammaDev <= threshold;
  }

  function onOrientation(e){
    const gamma = e.gamma == null ? 0 : e.gamma;
    const beta = e.beta == null ? 0 : e.beta;
    updateGauge(gamma);

    const normal = isNormalPosture(gamma, beta);

    if (!tripped && !normal){
      trip();
    } else if (tripped){
      if (normal){
        if (holdStart === null) holdStart = performance.now();
        const elapsed = (performance.now() - holdStart) / 1000;
        const remain = Math.max(0, holdSeconds - elapsed);
        ringNum.textContent = Math.ceil(remain);
        const offset = CIRC * (remain / holdSeconds);
        ringFg.style.strokeDashoffset = offset;
        resetHint.textContent = '';
        if (remain <= 0){
          untrip();
        }
      } else {
        holdStart = null;
        ringNum.textContent = holdSeconds;
        ringFg.style.strokeDashoffset = CIRC;
        resetHint.textContent = '姿勢跳返側躺 — 計時已重設';
      }
    }
  }

  function trip(){
    tripped = true;
    holdStart = null;
    ringNum.textContent = holdSeconds;
    ringFg.style.strokeDashoffset = CIRC;
    resetHint.textContent = '';
    overlay.classList.add('on');
    setStatus('已黑屏', 'tripped');
    if (navigator.vibrate) navigator.vibrate(120);
  }

  function untrip(){
    tripped = false;
    overlay.classList.remove('on');
    setStatus('偵測中', 'live');
    if (navigator.vibrate) navigator.vibrate([40,40,40]);
  }

  function startListening(){
    window.addEventListener('deviceorientation', onOrientation, true);
    setStatus('偵測中', 'live');
    startBtn.textContent = '停止偵測';
    calibrateBtn.disabled = false;
  }

  function stopListening(){
    window.removeEventListener('deviceorientation', onOrientation, true);
    tripped = false;
    overlay.classList.remove('on');
    setStatus('未啟動');
    startBtn.textContent = '開始偵測';
    calibrateBtn.disabled = true;
  }

  let listening = false;
  startBtn.addEventListener('click', async () => {
    if (listening){
      stopListening();
      listening = false;
      return;
    }
    // iOS 13+ 需要明確請求權限
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function'){
      try{
        const res = await DeviceOrientationEvent.requestPermission();
        if (res !== 'granted'){
          setStatus('權限被拒');
          return;
        }
      }catch(err){
        setStatus('權限錯誤');
        return;
      }
    }
    baseline = null;
    startListening();
    listening = true;
    setTimeout(() => calibrate(), 400); // 開始時自動用當下角度做基準
  });

  function calibrate(){
    function once(e){
      baseline = {
        gamma: e.gamma == null ? 0 : e.gamma,
        beta: e.beta == null ? 0 : e.beta
      };
      window.removeEventListener('deviceorientation', once, true);
      resetHint.textContent = '';
    }
    window.addEventListener('deviceorientation', once, true);
  }

  calibrateBtn.addEventListener('click', calibrate);
})();
</script>

</body>
</html>
